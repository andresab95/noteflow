<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NoteFlow">
<meta name="theme-color" content="#080C18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Structured Notes Distribution Platform">
<title>NoteFlow — Structured Notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');

/* ━━━ TOKENS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root{
  /* Surfaces */
  --bg:        #07090F;
  --s0:        #0B0E18;
  --s1:        #101624;
  --s2:        #161E30;
  --s3:        #1C2640;
  --b1:        #243048;
  --b2:        #2E3C58;
  /* Type — high contrast for institutional clarity */
  --t1:        #F0F4FF;   /* primary — near white */
  --t2:        #B8C8E8;   /* secondary — bright blue-grey */
  --t3:        #7A90B8;   /* tertiary — readable muted */
  --t4:        #4E6080;   /* disabled — subtle only */
  /* Accent — institutional blue */
  --a:         #2D6FE8;
  --a2:        #5A93F5;
  --abg:       #0A1830;
  --abd:       #1A3560;
  /* Positive — green */
  --g:         #2DB87A;
  --g2:        #5DD4A0;
  --gbg:       #041C11;
  --gbd:       #0A3D24;
  /* Warning — amber */
  --w:         #E8A030;
  --w2:        #F5C060;
  --wbg:       #1A1000;
  --wbd:       #3D2800;
  /* Danger — red */
  --r:         #E05555;
  --r2:        #F08080;
  --rbg:       #180505;
  --rbd:       #3D1010;
  /* Radius */
  --rad:       8px;
  --rad2:      12px;
  --rad3:      16px;
  /* Shadow */
  --sh1:       0 1px 3px rgba(0,0,0,.5);
  --sh2:       0 4px 20px rgba(0,0,0,.6);
  /* Typography */
  --sans:      'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:      'JetBrains Mono',monospace;
}

/* ━━━ RESET ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--sans);background:var(--s0);color:var(--t1);min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-size:13px;line-height:1.5}
input,select,button,textarea{font-family:inherit}
select option{background:var(--s1);color:var(--t1)}
button{cursor:pointer}

/* ━━━ LAYOUT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.app{max-width:100%;margin:0 auto;background:var(--s0);min-height:100vh;display:flex;flex-direction:column}
.body{padding:0 16px;flex:1}

@media(min-width:600px){
  body{background:#030508}
  .body{padding:0 28px}
}
@media(min-width:900px){
  body{background:#020407}
  .app{display:grid;grid-template-rows:54px 1fr;grid-template-columns:1fr}
  .hdr{grid-column:1;padding:0 44px;height:54px}
  .body{padding:16px 44px 40px}
  .hchips{grid-template-columns:repeat(4,minmax(0,180px));justify-content:start;gap:10px}
  .hero{padding:22px 26px}
  .bnav{display:none}
  .desktabs{padding:0}
  .desk-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  .desk-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:start}
  .desk-full{grid-column:1/-1}
}
@media(min-width:1280px){
  .hdr{padding:0 60px}
  .body{padding:16px 60px 40px}
  .desk-grid{gap:24px}
  .desk-grid-3{gap:20px}
}
@media(min-width:1600px){
  .hdr{padding:0 80px}
  .body{padding:16px 80px 40px}
}
/* ── DESK NAV ── */
.bnav-desk{display:flex;align-items:center;gap:3px;background:var(--s2);border-radius:10px;padding:4px;border:1px solid var(--b2)}
.bnav-desk-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--t2);transition:all .15s;white-space:nowrap;letter-spacing:.05px}
.bnav-desk-btn:hover{color:var(--t1);background:rgba(255,255,255,.06)}
.bnav-desk-btn.on{background:var(--a);color:#fff;font-weight:700;box-shadow:var(--sh1)}
.bnav-desk-btn .bdg{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:#C53030;color:#fff;font-size:9px;font-weight:700;padding:0 5px;margin-left:4px}

/* ── DESK CARDS — status-differentiated ── */
.dk-cards-list{display:block}
.dk-card{border-radius:14px;margin-bottom:10px;overflow:hidden;transition:transform .12s}
.dk-card:hover{transform:translateY(-1px)}
.dk-card-pending{background:var(--s1);border:1px solid var(--b2);box-shadow:var(--sh1)}
.dk-card-countered{background:#1A1400;border:1px solid #6B4A00;box-shadow:0 2px 12px rgba(255,176,0,.08)}
.dk-card-accepted{background:#081810;border:1px solid #0A4028;box-shadow:0 2px 12px rgba(45,184,122,.08)}
.dk-card-striking{background:#051A10;border:2px solid #0D6B40;box-shadow:0 4px 20px rgba(45,184,122,.15)}
.dk-card-passed{background:var(--s2);border:1px solid var(--b1);opacity:.65}
.dk-card-recounter{background:#0A1428;border:1px solid #1A4080;box-shadow:0 2px 12px rgba(90,147,245,.1)}

/* ── STATUS STRIPE — left edge bar ── */
.dk-stripe{width:4px;height:100%;border-radius:0}

/* ── NOTIONAL — the hero number ── */
.dk-notional{font-size:26px;font-weight:700;letter-spacing:-1px;font-family:var(--mono);line-height:1}
.dk-notional-sm{font-size:20px;font-weight:700;letter-spacing:-.5px;font-family:var(--mono);line-height:1}

/* ── TERM LABEL — more readable ── */
.tk-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.tk-val{font-size:13px;font-weight:700;line-height:1.2}

/* ── COUNTERED URGENCY ── */
.dk-urgent-banner{background:#2A1800;border-bottom:1px solid #6B4A00;padding:7px 16px;display:flex;align-items:center;gap:8px}
.dk-accepted-banner{background:#051810;border-bottom:1px solid #0A4028;padding:7px 16px;display:flex;align-items:center;gap:8px}

/* ── ACTION BUTTONS — desk ── */
.dba{flex:1;padding:10px 8px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.1px;transition:all .12s;border:none;display:flex;align-items:center;justify-content:center;gap:5px}
.dba-accept{background:#0A4028;color:#40E8A0;border:1px solid #0D6B40}
.dba-accept:hover{background:#0D5030;color:#60FFB8}
.dba-counter{background:#2A1800;color:#FFC040;border:1px solid #6B4A00}
.dba-counter:hover{background:#3A2200;color:#FFD870}
.dba-pass{background:var(--s2);color:var(--t3);border:1px solid var(--b2)}
.dba-pass:hover{background:var(--s3);color:var(--t2)}
.dba:disabled{opacity:.3;cursor:not-allowed}

/* ── BLOOMBERG HEADER ── */
.blp-strip{background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:14px 20px;margin-bottom:14px;display:grid;gap:0}
.blp-cell{padding:0 20px;border-right:1px solid var(--b2)}
.blp-cell:first-child{padding-left:0}
.blp-cell:last-child{border-right:none}
.blp-lbl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.blp-val{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px;line-height:1;margin-bottom:2px}
.blp-sub{font-size:10px;color:var(--t3)}

/* ━━━ HEADER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hdr{
  height:52px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  background:rgba(11,14,24,.96);
  border-bottom:1px solid var(--b1);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)
}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;
  letter-spacing:-.4px;color:var(--t1)}
.dbdg{font-size:8px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;background:var(--abg);color:var(--a2);border:1px solid var(--abd)}
.hright{display:flex;align-items:center;gap:5px}
.nbtn{width:32px;height:32px;border-radius:var(--rad);cursor:pointer;
  background:transparent;border:1px solid var(--b1);color:var(--t3);position:relative;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.nbtn:hover{background:var(--s2);color:var(--t2);border-color:var(--b2)}
.nbtn:active{background:var(--s3)}
.nbdg{position:absolute;top:-3px;right:-3px;min-width:14px;height:14px;
  border-radius:7px;background:#C53030;border:2px solid var(--s1);
  display:flex;align-items:center;justify-content:center;
  font-size:7px;font-weight:700;color:#fff;padding:0 3px}
.ava{height:32px;border-radius:var(--rad);background:var(--a);
  display:flex;align-items:center;gap:6px;padding:0 10px;
  font-size:11px;font-weight:600;cursor:pointer;color:#fff;border:none;
  transition:background .15s}
.ava:hover{background:var(--a2);color:#fff}

/* ━━━ HERO / DASHBOARD STRIP ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hero{margin:10px 0 8px;padding:16px;border-radius:var(--rad2);
  background:var(--s1);border:1px solid var(--b1);box-shadow:var(--sh1);
  position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(45,111,232,.07) 0%,transparent 68%);pointer-events:none}
.hero-label{font-size:8px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--a2);margin-bottom:4px;opacity:.9}
.hero-name{font-size:18px;font-weight:700;letter-spacing:-.5px;color:var(--t1);margin-bottom:2px}
.hero-sub{font-size:11px;color:var(--t3);line-height:1.4}
.hchips{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:12px}
.hchip{border-radius:var(--rad);padding:10px 6px;text-align:center;cursor:pointer;
  background:var(--s2);border:1px solid var(--b1);transition:all .12s}
.hchip:hover{background:var(--s3);border-color:var(--b2)}
.hchip:active{transform:scale(.97)}
.hchip-v{font-size:18px;font-weight:700;letter-spacing:-.5px;line-height:1;color:var(--t1);font-family:var(--mono)}
.hchip-l{font-size:8px;font-weight:500;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.6px}

/* ━━━ SECTION HEADER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:12px 0 7px}
.sec-title{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.9px}
.sec-action{font-size:11px;font-weight:600;color:var(--a2);cursor:pointer}

/* ━━━ TABS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.tabs{display:flex;gap:1px;background:var(--b1);border-radius:9px;
  padding:3px;margin-bottom:12px;border:1px solid var(--b1)}
.tab{flex:1;padding:6px 4px;border-radius:6px;border:none;cursor:pointer;
  font-weight:500;font-size:10px;letter-spacing:.1px;
  background:transparent;color:var(--t3);transition:all .15s}
.tab.on{background:var(--s1);color:var(--t1);font-weight:600;box-shadow:var(--sh1)}
.desktabs{display:flex;gap:0;border-bottom:1px solid var(--b1);margin-bottom:12px}
.desktab{flex:1;padding:10px 4px;border:none;background:transparent;
  font-size:10px;font-weight:500;color:var(--t3);cursor:pointer;
  position:relative;transition:color .15s;letter-spacing:.1px}
.desktab:hover{color:var(--t2)}
.desktab.on{color:var(--t1);font-weight:600}
.desktab.on::after{content:"";position:absolute;bottom:-1px;left:16%;right:16%;
  height:2px;background:var(--a);border-radius:2px 2px 0 0}
.desktab-badge{display:inline-flex;align-items:center;justify-content:center;
  min-width:14px;height:14px;border-radius:7px;background:#C53030;color:#fff;
  font-size:7px;font-weight:700;padding:0 3px;margin-left:3px;vertical-align:middle}

/* ━━━ CARDS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.card{background:var(--s1);border:1px solid var(--b2);border-radius:var(--rad2);
  padding:14px;margin-bottom:8px;position:relative;overflow:hidden;
  box-shadow:var(--sh1);transition:border-color .15s}
.card:active{border-color:var(--abd)}
.card-accent{position:absolute;top:0;left:0;width:2px;height:100%}
.card-row{display:flex;justify-content:space-between;align-items:flex-start}
.card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:8px;font-weight:600;letter-spacing:.4px;padding:2px 6px;
  border-radius:3px;text-transform:uppercase}
.tag-pt{background:var(--abg);color:var(--a2);border:1px solid var(--abd)}
.tag-issuer{background:var(--s2);color:var(--t2);border:1px solid var(--b1)}
.tickers{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.ticker{background:var(--s2);border:1px solid var(--b1);font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:5px;font-family:var(--mono);letter-spacing:.3px;color:var(--t1)}
.terms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px 8px;
  background:var(--s2);border-radius:var(--rad);padding:9px 11px;
  margin-top:2px;border:1px solid var(--b1)}
.term-lbl{font-size:8px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.6px}
.term-val{font-size:12px;font-weight:700;margin-top:2px;color:var(--t1)}
.card-amount{font-size:17px;font-weight:600;letter-spacing:-.3px;font-family:var(--mono);color:var(--t1)}
.card-badge{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  padding:2px 7px;border-radius:3px;margin-top:3px;display:inline-block}

/* ━━━ STATUS BADGES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.s-pending  {color:#FFC040;border-color:#7A4800;background:#2A1800;font-weight:700}
.s-accepted {color:#40E8A0;border-color:#0A5030;background:#051810;font-weight:700}
.s-countered{color:#FFC040;border-color:#7A4800;background:#2A1800;font-weight:700}
.s-passed   {color:#8090A8;border-color:#2A3848;background:#12181E;font-weight:600}
.s-cancelled{color:#607080;border-color:#1E2830;background:#0E1418;font-weight:600}
.s-striking {color:#40E8A0;border-color:#0A5030;background:#051810;font-weight:700}
.s-open     {color:#70B0FF;border-color:#1A3870;background:#081028;font-weight:700}

/* ━━━ ACTION BUTTONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.actbtns{display:flex;gap:6px;margin-top:10px}
.bacc{flex:1;padding:9px 7px;border-radius:var(--rad);font-size:12px;font-weight:700;
  border:1px solid #0A5030;background:#051810;color:#40E8A0;transition:all .12s;letter-spacing:.1px}
.bacc:hover{background:#082010;border-color:#40E8A0;color:#60FFB8}
.bacc:disabled{opacity:.3;cursor:not-allowed}
.bctr{flex:1;padding:9px 7px;border-radius:var(--rad);font-size:12px;font-weight:700;
  border:1px solid #7A4800;background:#2A1800;color:#FFC040;transition:all .12s;letter-spacing:.1px}
.bctr:hover{background:#3A2000;border-color:#FFC040;color:#FFD870}
.bctr:disabled{opacity:.3;cursor:not-allowed}
.bpas{flex:1;padding:9px 7px;border-radius:var(--rad);font-size:12px;font-weight:600;
  border:1px solid var(--b2);background:var(--s2);color:var(--t2);transition:all .12s}
.bpas:hover{background:var(--s3);color:var(--t1)}
.totbar{margin-top:7px;padding:8px 11px;background:var(--gbg);
  border:1px solid var(--gbd);border-radius:var(--rad);
  display:flex;justify-content:space-between;align-items:center}
.totlbl{font-size:8px;font-weight:600;color:var(--g);text-transform:uppercase;letter-spacing:.6px}
.totval{font-size:14px;font-weight:600;color:var(--g);font-family:var(--mono)}

/* ━━━ NOTE CARDS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.nc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad2);
  padding:13px;cursor:pointer;position:relative;overflow:hidden;
  margin-bottom:7px;box-shadow:var(--sh1);transition:border-color .15s}
.nc:hover{border-color:var(--b2)}
.nc:active{border-color:var(--abd)}
.nacc{position:absolute;top:0;left:0;width:2px;height:100%}
.ntop{display:flex;justify-content:space-between;align-items:flex-start}
.nlft{flex:1}
.nbgs{display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap}
.niss{font-weight:700;font-size:13px;letter-spacing:-.2px;color:var(--t1)}
.ptpill{font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px;
  letter-spacing:.4px;text-transform:uppercase}
.rkpill{font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px}
.newpill{font-size:8px;font-weight:500;padding:2px 6px;border-radius:3px;
  background:var(--s2);color:var(--t3);border:1px solid var(--b1)}
.utks{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px}
.utk{background:var(--s2);border:1px solid var(--b1);font-size:10px;font-weight:600;
  padding:2px 6px;border-radius:4px;font-family:var(--mono);color:var(--t1)}

/* ━━━ BOTTOM NAV ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.bnav{background:rgba(11,14,24,.97);border-top:1px solid var(--b1);

.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.mtitle{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--t1)}

.notifi:last-child{border-bottom:none}
.notifi:hover{background:var(--s2)}

/* ━━━ GLOSSARY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.gcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);

.gterm{font-weight:600;font-size:12px;letter-spacing:-.1px;color:var(--t1)}
.gshort{font-size:10px;color:var(--t3);margin-top:1px;line-height:1.4}
.gbody{padding:0 13px 13px 46px}

.srchwrap{position:relative;margin-bottom:8px}

.srchrow:last-child{border-bottom:none}
.seltks{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}

  cursor:pointer;transition:all .12s;font-family:var(--mono)}

/* ━━━ LOGIN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.login{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;background:var(--s0)}
.lcard{width:100%;max-width:340px}
.lfield{display:flex;align-items:center;gap:8px;background:var(--s2);
  border:1px solid var(--b1);border-radius:var(--rad);padding:10px 12px;
  margin-bottom:7px;transition:border-color .15s}
.lfield:focus-within{border-color:var(--a);box-shadow:0 0 0 2px rgba(45,111,232,.12)}
.lfield input{background:none;border:none;outline:none;color:var(--t1);font-size:13px;flex:1}
.lfield input::placeholder{color:var(--t4)}
.demobox{margin-top:12px;padding:12px;background:var(--s2);border-radius:var(--rad);border:1px solid var(--b1)}
.demorow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;
  border-bottom:1px solid var(--b1);cursor:pointer;transition:opacity .12s}
.demorow:hover{opacity:.75}
.demorow:last-child{border-bottom:none}

/* ━━━ SPLASH ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.splash{position:fixed;inset:0;background:#050810;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;
  transition:opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.4,0,.2,1)}
.splash.out{opacity:0;transform:scale(.98);pointer-events:none}

/* ━━━ ANIMATIONS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@keyframes hullRock{0%{transform:rotate(-1deg)}25%{transform:rotate(1.2deg)}50%{transform:rotate(-.7deg)}75%{transform:rotate(1deg)}100%{transform:rotate(-1deg)}}
@keyframes mainSailBreath{0%,100%{transform:scaleX(1);opacity:.95}40%{transform:scaleX(1.07);opacity:1}70%{transform:scaleX(.97);opacity:.88}}
@keyframes jibBreath{0%,100%{transform:scaleX(1);opacity:.55}40%{transform:scaleX(1.09);opacity:.72}70%{transform:scaleX(.96);opacity:.48}}
@keyframes wakeBreath{0%,100%{opacity:.8;stroke-width:2.5}50%{opacity:.45;stroke-width:1.8}}
@keyframes glowPulse{0%,100%{opacity:.5;transform:translate(-50%,-55%) scale(1)}50%{opacity:.85;transform:translate(-50%,-55%) scale(1.15)}}
@keyframes nameReveal{0%{opacity:0;letter-spacing:6px;transform:translateY(6px)}100%{opacity:1;letter-spacing:-.5px;transform:translateY(0)}}
@keyframes tagReveal{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}
.name-reveal{animation:nameReveal .7s cubic-bezier(.16,1,.3,1) .4s both}
.tag-reveal{animation:tagReveal .6s cubic-bezier(.16,1,.3,1) .75s both}
@keyframes streamFlow{0%{transform:translateX(-18px);opacity:0}20%{opacity:.6}80%{opacity:.4}100%{transform:translateX(18px);opacity:0}}
.water-lines{display:flex;flex-direction:column;gap:5px;margin-top:28px;align-items:center}
.water-lines span{height:1px;border-radius:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:streamFlow 1.8s ease-in-out infinite}
.water-lines span:nth-child(1){width:44px;animation-delay:0s}
.water-lines span:nth-child(2){width:60px;animation-delay:.22s}
.water-lines span:nth-child(3){width:36px;animation-delay:.44s}
.water-lines span:nth-child(4){width:52px;animation-delay:.66s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes fadeSlideUp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeSlideUp .3s cubic-bezier(.16,1,.3,1) both}

/* ━━━ MISC ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.vix{border-radius:var(--rad);padding:9px 11px;margin-bottom:9px;border:1px solid}
.vrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.vlft{display:flex;align-items:center;gap:5px}
.vdot{width:6px;height:6px;border-radius:50%}
.vlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.vpill{font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px}
.vtrk{height:2px;background:var(--b1);border-radius:1px;overflow:hidden;margin-bottom:4px}
.vbar{height:100%;border-radius:1px}
.vins{font-size:10px;color:var(--t3);line-height:1.5}
.lgd{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:8px 11px;margin-bottom:9px}
.lgdt{font-size:8px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.lgdy{display:flex;flex-wrap:wrap;gap:4px 10px;margin-bottom:4px}
.lgdi{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--t2);font-weight:400}
.lgdsq{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.lgdrk{display:flex;gap:10px;flex-wrap:wrap;padding-top:4px;border-top:1px solid var(--b1);align-items:center}
.lgdd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
</style>

const GLOSS=[
  // PRODUCT TYPES
  {cat:"Product Types",term:"Autocallable",c:"#22C55E",ico:"⚡",s:"Auto-redeems early when underlyings hit the call level on an observation date.",d:"On each scheduled observation date (quarterly, semi-annual, or annual), if ALL underlyings close at or above the autocall trigger (typically 100% of initial strike), the note calls early. You receive your full principal back plus all accrued coupon. If the note never calls, at final maturity you receive principal unless the barrier was breached — in which case you absorb the full 1:1 loss on the worst-performing underlying.",ex:"$1M 3-yr quarterly autocallable on AAPL/AMZN/TSLA at 10.50% p.a. All three above initial levels at Q1 observation → called at 100% + 2.625% coupon ($1,026,250). If TSLA drops 45% below barrier at maturity → return linked to TSLA performance (-45%).",r:"Worst-of basket: the worst performer determines your loss. Diversifying across correlated names reduces this risk. Auto-call never guaranteed — if markets fall, you may hold to maturity."},
  {cat:"Product Types",term:"Issuer Callable",c:"#16A34A",ico:"📞",s:"Desk has full discretion on redemption timing — no automatic trigger.",d:"The issuer (not a market trigger) decides when to call the note. They will call when it is economically advantageous for them — typically when rates fall and they can refinance cheaper. You receive principal plus accrued coupon on the call date. Otherwise you hold to maturity with the same barrier protection as an autocallable.",ex:"3-yr issuer callable at 12.00%, callable quarterly after 6-month non-call period. Desk calls at month 15 due to rate environment → $1M + $150,000 (15 months at 12%).",r:"You carry reinvestment risk when called early. The desk will only call when it benefits them, not you. Non-call periods provide minimum holding certainty."},
  {cat:"Product Types",term:"Participation",c:"#10B981",ico:"📈",s:"Leveraged upside exposure with full principal protection at maturity.",d:"Uses zero-coupon bonds + call options. At maturity: if the underlying (or basket) is up, you receive principal × (1 + participation rate × underlying gain), capped at any cap level. If the underlying is down, you receive 100% principal regardless. No coupon stream during the note's life.",ex:"$1M 3-yr on SPY, 140% participation, no cap. SPY +20% → $1M × (1 + 1.40 × 20%) = $1,280,000. SPY −35% → $1,000,000 (full protection).",r:"No income. Opportunity cost in bull markets if cap is tight. Returns rely entirely on issuer solvency. Inflation erodes the real value of the principal protection."},
  {cat:"Product Types",term:"Capital Protected",c:"var(--a)",ico:"🔒",s:"100% of principal returned at maturity regardless of market performance.",d:"Funded by a zero-coupon bond that matures at face value, with remaining capital used to purchase options for upside or conditional coupon exposure. Absolute floor at 100% — you cannot lose principal (only to issuer default). Often paired with a conditional coupon if the underlying stays within a range.",ex:"$500k 5-yr capital protected note on Euro Stoxx 50. Annual 6.5% coupon paid if index above 80% of initial. Index falls 40% → coupon missed but $500k returned at maturity.",r:"Entirely dependent on issuer credit. Credit spread widening reduces secondary market value. Long duration means significant interest-rate sensitivity."},
  {cat:"Product Types",term:"Catapult / Booster",c:"#EF4444",ico:"🚀",s:"Accelerated upside to a cap, with 1:1 downside below the barrier.",d:"Above initial level: you receive (1 + leverage × underlying gain), capped at the booster cap. No coupon. Below the barrier at maturity: 1:1 downside with no protection — you bear the full loss on the worst performer. Highest headline return potential but full capital at risk.",ex:"$500k 2-yr catapult on NVDA/META, 200% participation, 40% cap, 30% European barrier. NVDA +18% → $500k × (1 + 2×18%) = $680k (capped at +40% = $700k). NVDA −35% → $500k × 0.65 = $325k.",r:"No floor. No coupon. If barrier breaches at maturity, full 1:1 loss. Suitable only for investors comfortable with equity-like downside risk."},
  // KEY TERMS
  {cat:"Key Terms",term:"Barrier",c:"#F59E0B",ico:"🛡️",s:"The level below which downside protection is lost at maturity.",d:"European barrier: observed only at final maturity — the underlying must close BELOW the barrier on that exact date to trigger a loss. American (daily) barrier: observed every trading day during the note's life — any single daily close below the level triggers the loss event immediately. American barriers breach more often but typically come with higher coupons to compensate.",ex:"European 30% barrier on AAPL at $200 initial. Protection survives even if AAPL trades at $100 intra-term, as long as it closes above $140 ($200 × 70%) at final maturity.",r:"American/daily barriers offer less protection than European despite similar headline levels. Barrier breach does not mean total loss — it means your return becomes linked to the underlying's actual performance."},
  {cat:"Key Terms",term:"Memory Coupon",c:"#22C55E",ico:"🧠",s:"Missed coupons are remembered and paid in full on the next hit.",d:"Standard conditional coupon: if the underlying closes below the coupon barrier on an observation date, you receive nothing for that period and the opportunity is permanently lost. With memory: any missed coupons accumulate in a 'memory'. The moment the underlying closes above the barrier again on any future observation date, ALL accumulated missed coupons are paid at once in addition to the current period's coupon.",ex:"10% p.a. quarterly memory coupon on TSLA. Q1: TSLA below barrier → 0% paid, 2.5% accumulated. Q2: TSLA below barrier → 0% paid, 5% accumulated. Q3: TSLA above barrier → 2.5% + 5% + 2.5% = 10% paid in one payment.",r:"Memory notes offer lower headline coupons than equivalent non-memory notes. The memory benefit only materialises if the underlying recovers — a permanently impaired name never pays accumulated coupons."},
  {cat:"Key Terms",term:"Non-Call Period",c:"#22C55E",ico:"📅",s:"Minimum period during which the note cannot be called early.",d:"For autocallable and issuer callable notes, the non-call period is a lockout window from the trade date during which no early redemption can occur, regardless of market levels. A 6-month non-call on a quarterly autocallable means the first possible call date is 6 months in. Provides investors with a minimum guaranteed investment period and income stream.",ex:"3-yr quarterly autocallable with 6-month non-call. Trade date: Jan 2024. First call date: Jul 2024. If underlying is above call level at every quarterly observation from Jul 2024 onwards, note calls. Cannot call at Apr 2024 (3-month obs) regardless of levels.",r:"Non-call periods do not protect against barrier breach. They only delay the earliest possible call. Longer NC periods generally command slightly lower coupons."},
  {cat:"Key Terms",term:"Worst-of Basket",c:"#F59E0B",ico:"📊",s:"Your payoff is determined by the worst-performing underlying in the basket.",d:"In multi-underlying notes, all coupon payments and barrier observations reference the WORST performer among all underlyings. If three names are in the basket and two return +20% but one falls -40% through the barrier, the barrier is considered breached. The higher the correlation between names, the more predictable the basket behavior. Low-correlation baskets offer higher coupons but greater gap risk.",ex:"3-name basket: AAPL +15%, AMZN +8%, TSLA -42%. 30% barrier — TSLA has breached. Note return linked to TSLA's -42%, not the average. You receive $1M × (1 - 0.42) = $580k at maturity.",r:"Never look at basket average performance. The single worst name determines your outcome. One impaired name in a 5-name basket is all it takes."},
  {cat:"Key Terms",term:"Strike Date",c:"#22C55E",ico:"📌",s:"The date initial prices are set — all observations reference these levels.",d:"On the strike date (typically 2-5 business days after the trade date), initial reference prices are fixed for every underlying. All barrier levels, call triggers, and participation calculations are expressed as a percentage of these initial prices. If a name gaps down between trade date and strike date, your initial reference is the lower price — meaning you effectively start the note already partially through any buffer.",ex:"Trade date: Apr 8. Strike date: Apr 10. AAPL closes at $220 on Apr 10 → initial level = $220. A 30% European barrier = $154. Autocall trigger at 100% = $220.",r:"Gap risk between trade and strike date is real. Large single-day moves on the strike date affect all calculations for the note's entire life."},
  {cat:"Key Terms",term:"Twin Win",c:"#22C55E",ico:"↕️",s:"You profit from both upside AND downside moves, as long as the barrier is not breached.",d:"At maturity, if the barrier has NOT been breached: if the underlying is up, you receive principal × (1 + underlying return). If the underlying is DOWN (but above barrier), you receive principal × (1 + |underlying return|) — you are paid as if the market had gone up by the same amount. If the barrier IS breached, you bear the full downside loss.",ex:"$1M 2-yr twin win on SPY, 35% barrier, 100% participation. SPY +18% → $1,180,000. SPY −22% (no breach) → $1,220,000 (treated as +22%). SPY −38% (barrier breached) → $620,000.",r:"Twin win notes come with higher cost — lower participation or tighter barrier than equivalent single-direction notes. Barrier breach completely removes the downside-as-upside benefit."},
  {cat:"Key Terms",term:"Issuer Credit Risk",c:"#EF4444",ico:"🏦",s:"Structured notes are unsecured debt — issuer default means you lose everything.",d:"A structured note is a senior unsecured debt obligation of the issuing bank. It is NOT a deposit. It is NOT insured (FDIC, SIPC, etc.). If the issuing bank defaults or enters bankruptcy during the note's life, you become an unsecured creditor and may receive cents on the dollar in liquidation, regardless of underlying performance. This is true even if the underlying is performing perfectly.",ex:"Lehman Brothers issued tens of billions in structured notes. When Lehman failed in 2008, holders of 100% capital-protected notes with perfectly performing underlyings received ~8 cents on the dollar in bankruptcy.",r:"Always assess the issuing bank's credit quality (CDS spreads, ratings, capital ratios) before committing. Consider diversifying issuers across a portfolio of notes. Higher coupons from lower-rated issuers carry this implicit credit premium."},
  {cat:"Key Terms",term:"Secondary Market & Liquidity",c:"#F59E0B",ico:"💧",s:"Structured notes have limited secondary market liquidity — bid/ask spreads can be wide.",d:"Most structured notes are designed to be held to maturity. The issuing bank typically provides a secondary market bid but is not obligated to do so and may suspend it in stressed markets. Bid prices reflect both the mark-to-market value of the embedded options and the issuing bank's current credit spread. Selling before maturity often incurs a significant discount to theoretical fair value — sometimes 5-15% of notional.",ex:"You purchase a 3-yr autocallable at $1M. At 18 months with underlyings flat, the secondary bid might be $920,000-$950,000 — reflecting time value, potential early redemption premium, and bid-ask spread.",r:"Treat structured notes as illiquid. Only commit capital you can hold to maturity. Do not rely on early exit as part of your investment strategy unless you are willing to accept a material discount."},
  {cat:"Key Terms",term:"Observation Dates",c:"#22C55E",ico:"📆",s:"Scheduled dates when autocall triggers and coupon conditions are checked.",d:"The note documentation specifies all observation dates upfront: coupon observation dates (when the underlying must be above the coupon barrier to generate a payment) and autocall observation dates (when the underlying must be above the call trigger to redeem the note early). These are typically quarterly, semi-annual, or annual. Weekend/holiday adjustments apply per the schedule in the term sheet.",ex:"$1M quarterly autocallable on MSFT. Observation dates: Apr 10, Jul 10, Oct 10, Jan 10 (etc). On each date: is MSFT at or above initial? Yes → note called, principal + coupon returned. No → observation missed, next date checked.",r:"Missing a business day adjustment can shift your actual observation. Always confirm exact observation dates from the final term sheet, not the indicative terms."},
];

function SailAnimated({sz=120}){
  const id="sga",rx=Math.round(sz*.275);
  return h("svg",{width:sz,height:sz,viewBox:"0 0 80 80",fill:"none"},
    h("defs",null,
      h("linearGradient",{id,x1:0,y1:0,x2:80,y2:80,gradientUnits:"userSpaceOnUse"},
        h("stop",{stopColor:"#0EA5E9"}),
        h("stop",{offset:"1",stopColor:"#15803D"})
      )
    ),
    // Background — static
    h("rect",{width:80,height:80,rx,fill:"url(#"+id+")"}),

    // Everything inside rocks together — boat on water
    h("g",{style:{animation:"hullRock 3.6s ease-in-out infinite",transformOrigin:"40px 60px"}},

      // MAST — exactly as original, no animation
      h("path",{d:"M40 57L40 13",stroke:"#fff",strokeWidth:2.5,strokeLinecap:"round",fill:"none"}),

      // MAIN SAIL — exact original path, just breathes in opacity (wind filling)
      h("path",{d:"M40 15L18 52L40 52Z",fill:"#fff",
        style:{animation:"mainSailBreath 3.2s ease-in-out infinite",transformOrigin:"40px 35px"}}),

      // JIB SAIL — exact original path, breathes offset
      h("path",{d:"M40 19L59 46L40 46Z",fill:"#fff",fillOpacity:.55,
        style:{animation:"jibBreath 3.2s ease-in-out .5s infinite",transformOrigin:"40px 33px"}}),

      // WAKE LINE 1 — exact original, subtle opacity pulse
      h("path",{d:"M17 56Q40 62 63 56",stroke:"#fff",strokeWidth:2.5,strokeLinecap:"round",fill:"none",
        style:{animation:"wakeBreath 2.8s ease-in-out infinite"}}),

  );
}

// Module-level counter store — survives all React re-renders and loadData calls
const _rfqCounters = {};
const _indCounters = {};
const _rfqHistory={};
function _storeCounter(key, counter, history){ 
  if(key&&counter){ 
    _rfqCounters[key]=counter;
    if(history) _rfqHistory[key]=history;
    try{localStorage.setItem('nfc_'+key, JSON.stringify(counter));}catch(e){}
    try{if(history)localStorage.setItem('nfh_'+key, JSON.stringify(history));}catch(e){}
  }
}
function _getCounter(key){
  if(!key)return null;
  if(_rfqCounters[key])return _rfqCounters[key];
  try{const v=localStorage.getItem('nfc_'+key);if(v)return JSON.parse(v);}catch(e){}
  return null;
}
function _getHistory(key){
  if(!key)return null;
  if(_rfqHistory[key])return _rfqHistory[key];
  try{const v=localStorage.getItem('nfh_'+key);if(v)return JSON.parse(v);}catch(e){}
  return null;
}

  async function doResetPassword(){

    try{

        method:'PUT',
        headers:{
          'Content-Type':'application/json',
          'apikey':SUPABASE_ANON,
          'Authorization':'Bearer '+resetToken
        },
        body:JSON.stringify({password:newPw})
      });
      const d=await r.json();
      if(!r.ok){setLerr(d.message||d.error_description||"Failed to reset password. Please try again.");return;}
      setResetDone(true);
      setNewPw("");setNewPwConfirm("");
    }catch(e){
      setLerr("Failed to reset password. Please try again.");
    }finally{setLoading(false);}
  }

  // Generate and download a term sheet as CSV for a given accepted indication
  // ── Note Moniker — deterministic 3-word code assigned when note is accepted ──
  const MONIKER_ADJ=["ALPHA","BRAVO","COBALT","DELTA","ECHO","FALCON","GOLD","HAWK","IRON","JADE","KILO","LIMA","NOVA","ONYX","PEARL","QUARTZ","RUBY","SIERRA","TITAN","ULTRA","VEGA","WOLF","XRAY","YANKEE","ZINC"];
  const MONIKER_NOUN=["ARROW","BEAR","CREST","DOME","EDGE","FLARE","GATE","HALO","ISLE","JAW","KEEL","LANCE","MAST","NODE","OAK","PEAK","QUEST","REEF","SPIRE","TIDE","URN","VALE","WAVE","XTON","YARD","ZONE"];
  function generateMoniker(id){
    // Deterministic from id — same id always gets same moniker
    const seed=id.split("").reduce((h,ch)=>((h<<5)-h)+ch.charCodeAt(0),0)>>>0;
    const a=MONIKER_ADJ[seed%MONIKER_ADJ.length];
    const n=MONIKER_NOUN[(seed>>8)%MONIKER_NOUN.length];
    const num=String(100+(seed>>16)%900);
    return a+"-"+n+"-"+num;
  }

        read:false,type:"counter"},...p]);

        });
        console.log("counter_rounds:",crResult?"✅ saved":"❌ null");
        if(crResult){

// ── SUPABASE SETUP ──────────────────────────────────────────────────────────
const {createClient} = supabase;
const _sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
  realtime:{params:{eventsPerSecond:10}},
  db:{schema:"public"}
});
window._sb = _sb;

// ── REST API direct fetch — bypasses SDK auth/RLS entirely using anon key ──
// Get auth token — use live session JWT if available, fall back to anon key
async function _getAuthToken(){
  try{
    if(window._sb){
      const {data}=await window._sb.auth.getSession();
      if(data?.session?.access_token) return data.session.access_token;
    }
  }catch(e){}
  return SUPABASE_ANON;
}

window._sbFetch = async function(table, params=""){
  // Try SDK first (handles RLS automatically)
  if(window._sb){
    try{
      let q=window._sb.from(table).select("*");
      // Parse simple params
      if(params.includes("status=eq.")){const v=params.match(/status=eq\.([^&]+)/)?.[1];if(v)q=q.eq("status",v);}
      if(params.includes("order=created_at.desc"))q=q.order("created_at",{ascending:false});
      if(params.includes("order=created_at.asc"))q=q.order("created_at",{ascending:true});
      const {data,error}=await q;
      if(!error) return data;
      console.warn("SDK fetch error",table,error.message);
    }catch(e){console.warn("SDK fetch exception",e);}
  }
  // Fallback REST
  try{
    const token = await _getAuthToken();
    const url = SUPABASE_URL+"/rest/v1/"+table+"?"+params;
    const res = await fetch(url,{headers:{"apikey":SUPABASE_ANON,"Authorization":"Bearer "+token,"Content-Type":"application/json","Prefer":"return=representation"}});
    if(res.ok) return res.json();
    const err=await res.text();console.warn("REST fetch error",table,err);
  }catch(e){console.warn("REST fetch exception",e);}
  return null;
};

window._sbPatch = async function(table, id, body){
  // Try REST with anon key first (bypasses RLS)
  try{
    const url = SUPABASE_URL+"/rest/v1/"+table+"?id=eq."+id;
    const res = await fetch(url,{method:"PATCH",headers:{"apikey":SUPABASE_ANON,"Authorization":"Bearer "+SUPABASE_ANON,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify(body)});
    if(res.ok) return true;
    console.warn("REST PATCH failed",table,id,res.status);
  }catch(e){console.warn("REST PATCH error",e);}
  // Try SDK
  if(window._sb){
    try{
      const {error}=await window._sb.from(table).update(body).eq("id",id);
      if(!error) return true;
      console.warn("SDK PATCH error",table,id,error.message);
    }catch(e){console.warn("SDK PATCH exception",e);}
  }
  // Fallback to REST with auth token
  try{
    const token = await _getAuthToken();
    const url = SUPABASE_URL+"/rest/v1/"+table+"?id=eq."+id;
    const res = await fetch(url, {
      method:"PATCH",
      headers:{"apikey":SUPABASE_ANON,"Authorization":"Bearer "+token,"Content-Type":"application/json","Prefer":"return=representation"},
      body: JSON.stringify(body)
    });
    if(res.ok) return true;
    const err=await res.text();
    console.warn("REST PATCH FAILED",table,id,res.status,err);
  }catch(e){console.warn("REST PATCH exception",e);}
  return false;
};

window._sbPost = async function(table, body){
  // Try REST with anon key first (bypasses RLS, always works)
  try{
    const url = SUPABASE_URL+"/rest/v1/"+table;
    const res = await fetch(url, {
      method:"POST",
      headers:{"apikey":SUPABASE_ANON,"Authorization":"Bearer "+SUPABASE_ANON,
               "Content-Type":"application/json","Prefer":"return=representation"},
      body:JSON.stringify(body)
    });
    if(res.ok){ const d=await res.json(); return Array.isArray(d)?d:[d]; }
    console.warn("REST POST failed",table,res.status);
  }catch(e){console.warn("REST POST error",e);}
  // Try SDK as secondary
  if(window._sb){
    try{
      const {data,error}=await window._sb.from(table).insert(body).select();
      if(!error) return data;
      console.warn("SDK POST error",table,error.message);
    }catch(e){console.warn("SDK POST exception",e);}
  }
  // Fallback REST with auth token
  try{
    const token = await _getAuthToken();
    const url = SUPABASE_URL+"/rest/v1/"+table;
    const res = await fetch(url, {
      method:"POST",
      headers:{"apikey":SUPABASE_ANON,"Authorization":"Bearer "+token,"Content-Type":"application/json","Prefer":"return=representation"},
      body: JSON.stringify(body)
    });
    if(res.ok) return res.json();
    const t=await res.text();console.warn("REST POST error",table,t);
  }catch(e){console.warn("REST POST exception",e);}
  return null;
};
