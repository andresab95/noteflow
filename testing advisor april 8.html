<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NoteFlow">
<meta name="theme-color" content="#080C18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Structured Notes Distribution Platform">
<title>NoteFlow — Structured Notes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#080A12;color:#E8EAF0;min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale
}
input,select,button,textarea{font-family:inherit}
select option{background:#10131F;color:#E8EAF0}

/* ── LAYOUT ── */
.app{
  max-width:430px;margin:0 auto;background:#080A12;
  min-height:100vh;display:flex;flex-direction:column
}
.body{padding:0 16px;flex:1}
@media(min-width:430px){
  body{display:flex;justify-content:center;background:#04050A}
  .app{max-width:430px;min-height:100vh;border-left:1px solid rgba(255,255,255,.04);border-right:1px solid rgba(255,255,255,.04)}
}

/* ── HEADER ── */
.hdr{
  height:54px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  background:rgba(8,10,18,.9);
  border-bottom:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)
}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:-.5px;color:#fff}
.dbdg{
  font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;
  background:rgba(99,102,241,.18);color:#818CF8;
  border:1px solid rgba(99,102,241,.25)
}
.hright{display:flex;align-items:center;gap:6px}
.nbtn{
  width:34px;height:34px;border-radius:8px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  color:rgba(255,255,255,.5);position:relative;
  display:flex;align-items:center;justify-content:center;transition:all .15s
}
.nbtn:active{background:rgba(255,255,255,.09)}
.nbdg{
  position:absolute;top:-2px;right:-2px;min-width:14px;height:14px;
  border-radius:7px;background:#EF4444;border:2px solid #080A12;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;font-weight:800;color:#fff;padding:0 3px
}
.ava{
  height:34px;border-radius:8px;
  background:linear-gradient(135deg,#6366F1,#8B5CF6);
  display:flex;align-items:center;gap:6px;padding:0 10px;
  font-size:11px;font-weight:700;cursor:pointer;color:#fff;border:none
}

/* ── HERO ── */
.hero{
  margin:12px 0 10px;padding:18px;border-radius:16px;
  background:#0F1120;
  border:1px solid rgba(255,255,255,.06);
  position:relative;overflow:hidden
}
.hero::before{
  content:"";position:absolute;
  top:-80px;right:-80px;width:220px;height:220px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 70%);
  pointer-events:none
}
.hero-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(129,140,248,.6);margin-bottom:5px}
.hero-name{font-size:21px;font-weight:800;letter-spacing:-.5px;color:#fff;margin-bottom:3px}
.hero-sub{font-size:11px;color:rgba(255,255,255,.38);line-height:1.4}

/* ── STAT CHIPS inside hero ── */
.hchips{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:14px}
.hchip{
  border-radius:10px;padding:9px 6px;text-align:center;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  transition:transform .12s
}
.hchip:active{transform:scale(.96)}
.hchip-v{font-size:20px;font-weight:900;letter-spacing:-1px;line-height:1}
.hchip-l{font-size:8px;font-weight:600;color:rgba(255,255,255,.35);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px}
.sec-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px}
.sec-action{font-size:11px;font-weight:700;color:#6366F1;cursor:pointer}

/* ── TOP TABS (client) ── */
.tabs{
  display:flex;gap:2px;
  background:rgba(255,255,255,.04);
  border-radius:10px;padding:3px;margin-bottom:12px;
  border:1px solid rgba(255,255,255,.05)
}
.tab{
  flex:1;padding:7px 4px;border-radius:7px;border:none;cursor:pointer;
  font-weight:700;font-size:10px;letter-spacing:.1px;
  background:transparent;color:rgba(255,255,255,.3);transition:all .18s
}
.tab.on{background:#1A1D2E;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.4)}

/* ── DESK TAB BAR ── */
.desktabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:14px}
.desktab{
  flex:1;padding:10px 4px;border:none;background:transparent;
  font-size:10px;font-weight:700;color:rgba(255,255,255,.3);
  cursor:pointer;position:relative;transition:color .15s;letter-spacing:.1px
}
.desktab.on{color:#fff}
.desktab.on::after{
  content:"";position:absolute;bottom:-1px;left:12%;right:12%;height:2px;
  background:#6366F1;border-radius:2px 2px 0 0
}
.desktab-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:14px;height:14px;border-radius:7px;
  background:#EF4444;color:#fff;font-size:7px;font-weight:800;
  padding:0 3px;margin-left:3px;vertical-align:middle
}

/* ── CARDS ── */
.card{
  background:#0F1120;border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:14px;margin-bottom:8px;
  position:relative;overflow:hidden;transition:border-color .15s
}
.card:active{border-color:rgba(99,102,241,.3)}
.card-accent{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px}
.card-row{display:flex;justify-content:space-between;align-items:flex-start}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.tag{
  font-size:8px;font-weight:700;letter-spacing:.3px;padding:2px 7px;
  border-radius:4px;text-transform:uppercase
}
.tag-pt{background:rgba(99,102,241,.15);color:#818CF8;border:1px solid rgba(99,102,241,.2)}
.tag-issuer{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.tickers{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.ticker{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);
  font-size:11px;font-weight:800;padding:3px 7px;border-radius:6px;
  font-family:'DM Mono',monospace;letter-spacing:.3px
}
.terms-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px 8px;
  background:rgba(255,255,255,.03);border-radius:8px;
  padding:8px 10px;margin-top:2px
}
.term-lbl{font-size:8px;color:rgba(255,255,255,.28);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.term-val{font-size:11px;font-weight:700;margin-top:2px;color:#E8EAF0}
.card-amount{font-size:19px;font-weight:900;letter-spacing:-1px;font-family:'DM Mono',monospace}
.card-badge{
  font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;margin-top:4px;display:inline-block
}

/* ── STATUS COLORS ── */
.s-pending{color:#F59E0B;border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.08)}
.s-accepted{color:#10B981;border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.08)}
.s-countered{color:#F59E0B;border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.08)}
.s-passed{color:rgba(255,255,255,.3);border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.04)}
.s-cancelled{color:rgba(255,255,255,.25);border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.03)}
.s-striking{color:#10B981;border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.08)}
.s-open{color:#6366F1;border-color:rgba(99,102,241,.25);background:rgba(99,102,241,.08)}

/* ── ACTION BUTTONS on desk cards ── */
.actbtns{display:flex;gap:6px;margin-top:10px}
.bacc{
  flex:1;padding:8px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;
  border:1px solid rgba(16,185,129,.3);background:rgba(16,185,129,.08);color:#10B981;
  transition:background .12s
}
.bacc:active{background:rgba(16,185,129,.15)}
.bctr{
  flex:1;padding:8px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;
  border:1px solid rgba(245,158,11,.3);background:rgba(245,158,11,.08);color:#F59E0B;
  transition:background .12s
}
.bctr:active{background:rgba(245,158,11,.15)}
.bpas{
  flex:1;padding:8px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;
  border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.3)
}

/* ── TOTAL BAR ── */
.totbar{
  margin-top:8px;padding:8px 12px;
  background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.12);
  border-radius:8px;display:flex;justify-content:space-between;align-items:center
}
.totlbl{font-size:9px;font-weight:700;color:rgba(16,185,129,.5);text-transform:uppercase;letter-spacing:.5px}
.totval{font-size:16px;font-weight:900;color:#10B981;font-family:'DM Mono',monospace}

/* ── NOTE BROWSE CARDS ── */
.nc{
  background:#0F1120;border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:14px;cursor:pointer;
  position:relative;overflow:hidden;margin-bottom:8px;transition:border-color .15s
}
.nc:active{border-color:rgba(99,102,241,.3)}
.nacc{position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px}
.ntop{display:flex;justify-content:space-between;align-items:flex-start}
.nlft{flex:1}
.nbgs{display:flex;align-items:center;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.niss{font-weight:700;font-size:14px;letter-spacing:-.2px;color:#fff}
.ptpill{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase}
.rkpill{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px}
.newpill{font-size:8px;font-weight:600;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
.utks{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.utk{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);
  font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;
  font-family:'DM Mono',monospace
}
.nflds{display:grid;grid-template-columns:1fr 1fr;gap:5px 12px}
.nfll{font-size:8px;color:rgba(255,255,255,.28);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.nflv{font-size:12px;font-weight:700;margin-top:2px}
.nrgt{text-align:right;margin-left:12px;flex-shrink:0}
.cnum{font-size:24px;font-weight:900;line-height:1;letter-spacing:-1px;font-family:'DM Mono',monospace}
.csub{font-size:9px;color:rgba(255,255,255,.3);margin-top:3px}
.nfoot{margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center}
.ntime{font-size:10px;color:rgba(255,255,255,.25)}
.ncta{font-size:11px;font-weight:700;color:#6366F1}
.clsbar{margin-top:8px;padding:6px 10px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:7px;display:flex;align-items:center;gap:6px}
.clsdot{width:5px;height:5px;border-radius:50%;background:#EF4444;flex-shrink:0}
.clstxt{font-size:9px;font-weight:700;color:#EF4444;text-transform:uppercase;letter-spacing:.5px}

/* ── FORMS ── */
.frow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fpill{
  padding:5px 11px;border-radius:6px;border:1px solid;cursor:pointer;
  font-weight:700;font-size:10px;background:transparent;color:rgba(255,255,255,.4);
  transition:all .12s
}
.slbl{font-size:9px;color:rgba(255,255,255,.35);font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.chip{
  padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.08);
  cursor:pointer;font-weight:700;font-size:11px;
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);transition:all .12s
}
.chip:active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3);color:#818CF8}
.fg{margin-bottom:10px}
.fl{font-size:9px;color:rgba(255,255,255,.35);font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.fi{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:8px;
  padding:10px 12px;color:#E8EAF0;font-size:13px;font-weight:600;outline:none;
  transition:border-color .15s
}
.fi:focus{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.04)}
.fsel{
  width:100%;background:#10131F;border:1px solid rgba(255,255,255,.08);
  border-radius:8px;padding:10px 11px;color:#E8EAF0;font-size:12px;outline:none
}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.bM{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#6366F1 0%,#8B5CF6 100%);
  color:#fff;font-weight:800;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:-.1px
}
.bD{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.2);
  font-weight:800;font-size:13px;cursor:not-allowed
}
.togwrap{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:9px;margin-bottom:8px;cursor:pointer}
.togtrk{width:38px;height:22px;border-radius:11px;position:relative;flex-shrink:0;transition:background .2s;cursor:pointer}
.togthm{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.bpair{display:flex;gap:6px;margin-bottom:10px}
.bpb{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.08);cursor:pointer;font-size:11px;font-weight:700;background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);transition:all .12s}
.bpb.on{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3);color:#818CF8}

/* ── DESK CARDS ── */
.dcard{background:#0F1120;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden}
.drow{display:flex;align-items:center;gap:10px}
.dticker{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.dinfo{flex:1;min-width:0}
.dname{font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;color:#fff}
.dsub{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dsig{text-align:right;flex-shrink:0}
.signum{font-size:18px;font-weight:900;line-height:1;letter-spacing:-1px;font-family:'DM Mono',monospace}
.siglbl{font-size:8px;color:rgba(255,255,255,.3);margin-top:2px}
.ocard{background:#0F1120;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px;margin-bottom:8px}
.spill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:4px;display:inline-block;text-transform:uppercase;letter-spacing:.4px}
.ctrbox{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.18);border-radius:9px;padding:10px 12px;margin-top:9px}

/* ── BOTTOM NAV ── */
.bnav{
  background:rgba(8,10,18,.96);border-top:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:6px 0 env(safe-area-inset-bottom,12px);
  display:flex;justify-content:space-around;align-items:center;
  position:sticky;bottom:0;width:100%;z-index:50
}
.navbtn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 6px;min-width:54px}
.navlbl{font-size:9px;font-weight:600;letter-spacing:.1px;transition:color .15s}

/* ── MODALS ── */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;z-index:100;backdrop-filter:blur(6px)}
.mbox{
  background:#0F1120;border:1px solid rgba(255,255,255,.08);
  border-radius:20px 20px 0 0;width:100%;max-width:430px;
  margin:0 auto;padding:20px 18px 32px;max-height:92vh;overflow-y:auto
}
.mhdl{width:32px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 16px}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mtitle{font-size:16px;font-weight:800;letter-spacing:-.3px;color:#fff}
.xbtn{
  width:28px;height:28px;border-radius:7px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  cursor:pointer;color:rgba(255,255,255,.5);font-size:14px;
  display:flex;align-items:center;justify-content:center
}
.cover{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200;backdrop-filter:blur(8px)}
.cbox{background:#0F1120;border:1px solid rgba(255,255,255,.08);border-radius:18px;width:100%;max-width:390px;padding:22px}
.mbtns{display:flex;gap:8px;margin-top:14px}
.bcnl{flex:1;padding:11px;border-radius:9px;border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.4);font-weight:600;font-size:13px;cursor:pointer}
.bokbtn{flex:2;padding:11px;border-radius:9px;border:none;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;font-weight:800;font-size:13px;cursor:pointer}
.ibox{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:9px;padding:10px 12px;margin-bottom:10px}
.ir{font-size:12px;color:rgba(255,255,255,.38);margin-bottom:3px}

/* ── TOAST ── */
.toast{
  background:#0A1A12;border:1px solid rgba(16,185,129,.25);
  color:#10B981;padding:10px 14px;border-radius:10px;
  font-weight:700;font-size:12px;margin-bottom:10px;
  display:flex;align-items:center;gap:7px
}

/* ── NOTIFICATIONS ── */
.notifdraw{background:#0F1120;border:1px solid rgba(255,255,255,.07);border-radius:14px;margin-bottom:12px;overflow:hidden}
.notifh{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;color:#fff}
.notifi{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:8px;transition:background .12s}
.notifi:last-child{border-bottom:none}
.notifi:active{background:rgba(255,255,255,.02)}
.ndot{width:5px;height:5px;border-radius:50%;margin-top:6px;flex-shrink:0}
.ntit{font-size:12px;font-weight:700;margin-bottom:2px;color:#E8EAF0}
.nbody{font-size:11px;color:rgba(255,255,255,.35);line-height:1.5}

/* ── GLOSSARY ── */

  useEffect(()=>{
    if(!user)return;

    // ── Layer 1: Broadcast channel — sub-second push when any device writes
    const broadcastCh=window._sb.channel("noteflow-broadcast")
      .on("broadcast",{event:"sync"},()=>loadData())
      .subscribe();

    // ── Layer 2: Postgres changes — DB-level trigger
    let pgCh;
    try{
      pgCh=window._sb.channel("noteflow-pg")
        .on("postgres_changes",{event:"*",schema:"public",table:"indications"},()=>loadData())
        .on("postgres_changes",{event:"*",schema:"public",table:"counter_rounds"},()=>loadData())
        .on("postgres_changes",{event:"*",schema:"public",table:"notes"},()=>loadData())
        .on("postgres_changes",{event:"*",schema:"public",table:"rfq_requests"},()=>loadData())
        .subscribe();
    }catch(e){console.log("pg channel:",e);}

    // ── Layer 3: 3s poll — absolute safety net
    const poll=setInterval(()=>loadData(),3000);

    return()=>{
      clearInterval(poll);
      try{window._sb.removeChannel(broadcastCh);}catch(e){}
      try{if(pgCh)window._sb.removeChannel(pgCh);}catch(e){}
    };

    async function doLogin(){
    setLerr("");
    if(!em||!pw){setLerr("Please enter your email and password");return;}

    // Step 1 — always check demo accounts first, no network needed
    const demoUser=USERS.find(u=>u.email===em.toLowerCase().trim()&&u.pw===pw);
    if(demoUser){
      try{
        const {data:a,error:ae}=await window._sb.auth.signInWithPassword({
          email:em.toLowerCase().trim(),password:pw
        });
        if(!ae&&a?.user){
          const {data:profiles}=await window._sb.from("users").select("*").eq("email",em.toLowerCase().trim());
          const profile=profiles?.length>0?profiles[0]:null;
          setUser({...demoUser,id:a.user.id,firmId:profile?.firm_id||null});
          setLerr("");return;
        }
        // Supabase auth failed — try to create the demo account
        const {data:su,error:se}=await window._sb.auth.signUp({
          email:em.toLowerCase().trim(),password:pw,
          options:{data:{role:demoUser.role,full_name:demoUser.name}}
        });
        if(!se&&su?.user){
          setUser({...demoUser,id:su.user.id,firmId:null});
          setLerr("");return;
        }
      }catch(e){console.log("demo login error:",e);}
      // Last resort fallback with fake id — realtime still works via email match
      setUser(demoUser);setLerr("");return;
    }

    // Step 2 — try Supabase for real accounts
    if(!window._sb){setLerr("Invalid email or password");return;}
    try{
      const {data:a,error:ae}=await window._sb.auth.signInWithPassword({
        email:em.toLowerCase().trim(),password:pw
      });
      if(ae){setLerr("Invalid email or password");return;}

      // Query by email to get correct profile (handles duplicate IDs)
      const {data:profiles}=await window._sb.from("users")
        .select("id,email,full_name,initials,role,firm_id,is_active")
        .eq("email",em.toLowerCase().trim());
      
      // Pick desk role if multiple profiles exist
      const profile=profiles&&profiles.length>0
        ?(profiles.find(p=>p.role==="desk")||profiles[0])
        :null;

      if(!profile){
        const meta=a.user.user_metadata||{};
        setUser({id:a.user.id,email:em.toLowerCase().trim(),
          name:meta.full_name||em,ini:(em[0]||"A").toUpperCase()+(em[1]||"A").toUpperCase(),
          role:meta.role||"client",firmId:null});
        return;
      }
      if(!profile.is_active){setLerr("Your account is inactive.");return;}
      setUser({id:profile.id,email:profile.email,name:profile.full_name,
        ini:profile.initials,role:profile.role,firmId:profile.firm_id});
    }catch(e){setLerr("Invalid email or password");}
  }

    rows.push(["Type","Client","Amount (USD)","Status","Product","Issuer","Underlyings","Tenor","Coupon %","Barrier %","Obs. Freq","Barrier Type","Memory","Participation %","Leverage","Cap %","Strike %","Counter Issuer","Counter Coupon %","Counter Barrier %","Counter Tenor","Counter Obs. Freq","Counter Participation %","Counter Leverage","Counter Cap %","Counter Message","Time"]);

    inds.forEach(ind=>{

      const c=ind.counter||{};
      rows.push([
        "Indication",
        ind.cn,
        ind.amt,
        ind.st,
        note?PT[note.pt]?.l:"",
        note?note.issuer:"",
        note?note.und.join(", "):"",
        note?note.tenor:"",

        "","",
        note?note.pr||"":"",
        note?note.lev||"":"",
        note?note.cap||"":"",

        ind.t||""
      ]);
    });

    // All client structures (RFQs)
    rfqs.forEach(ri=>{
      rows.push([
        "Structure",
        ri.cn,
        ri.notional,
        ri.status,
        PT[ri.pt]?.l||"",
        ri.issuers?.join(", ")||"",
        ri.und?.join(", ")||"",
        ri.tenor||"",
        ri.coup||"",
        ri.barrier||"",
        ri.cf||"",
        ri.btype||"",
        ri.mem?"Yes":"No",
        ri.lev||"","",ri.cap||"","",
        "","","","","","","","",
        ri.dm||"",
        ""
      ]);
    });

    // Build CSV content
    const NL="\n";
    const q=function(v){var s=String(v==null?"":v);if(s.indexOf(",")>=0||s.indexOf("\"")==0||s.length===0)return "\""+s.replace(/\"/g,"\"\"")+"\"";return s;};
    var csvLines=[];
    for(var i=0;i<rows.length;i++){csvLines.push(rows[i].map(q).join(","));}
    var csv=csvLines.join(NL);
        // Download
    const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="NoteFlow_"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a);
    a.click();

    URL.revokeObjectURL(url);
    toast_("Exported to Excel!");

// ── SUPABASE SETUP ──────────────────────────────────────────────────────────
const {createClient} = supabase;
const _sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
  realtime:{params:{eventsPerSecond:10}},
  db:{schema:"public"}
});
window._sb = _sb;

// ── REST API direct fetch — bypasses SDK auth/RLS entirely using anon key ──
window._sbFetch = async function(table, params=""){
  const url = SUPABASE_URL+"/rest/v1/"+table+"?"+params;
  const res = await fetch(url, {
    headers:{
      "apikey": SUPABASE_ANON,
      "Authorization": "Bearer "+SUPABASE_ANON,
      "Content-Type": "application/json",
      "Prefer": "return=representation"
    }
  });
  if(!res.ok){
    const err = await res.text();
    console.warn("REST fetch error for",table,":",err);
    return null;
  }
  return res.json();
};

window._sbPatch = async function(table, id, body){
  const url = SUPABASE_URL+"/rest/v1/"+table+"?id=eq."+id;
  const res = await fetch(url, {
    method:"PATCH",
    headers:{
      "apikey": SUPABASE_ANON,
      "Authorization": "Bearer "+SUPABASE_ANON,
      "Content-Type": "application/json",
      "Prefer": "return=representation"
    },
    body: JSON.stringify(body)
  });
  return res.ok;
};

window._sbPost = async function(table, body){
  const url = SUPABASE_URL+"/rest/v1/"+table;
  const res = await fetch(url, {
    method:"POST",
    headers:{
      "apikey": SUPABASE_ANON,
      "Authorization": "Bearer "+SUPABASE_ANON,
      "Content-Type": "application/json",
      "Prefer": "return=representation"
    },
    body: JSON.stringify(body)
  });
  if(!res.ok){const t=await res.text();console.warn("POST error",table,t);return null;}
  return res.json();
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));

</script>
