/* Whole boat rocks gently — pivot at waterline */
@keyframes hullRock{
  0%   {transform:rotate(-1deg)}
  25%  {transform:rotate(1.2deg)}
  50%  {transform:rotate(-.7deg)}
  75%  {transform:rotate(1deg)}
  100% {transform:rotate(-1deg)}
}
/* Main sail fills with air — slight scale on X from the mast edge */
@keyframes mainSailBreath{
  0%,100%{transform:scaleX(1);opacity:.95}
  40%    {transform:scaleX(1.07);opacity:1}
  70%    {transform:scaleX(.97);opacity:.88}
}
/* Jib sail — catches wind after main */
@keyframes jibBreath{
  0%,100%{transform:scaleX(1);opacity:.55}
  40%    {transform:scaleX(1.09);opacity:.72}
  70%    {transform:scaleX(.96);opacity:.48}
}
/* Wake lines pulse — water flowing past hull */
@keyframes wakeBreath{
  0%,100%{opacity:.8;stroke-width:2.5}
  50%    {opacity:.45;stroke-width:1.8}
}
/* Glow breathes */
@keyframes glowPulse{
  0%,100%{opacity:.5;transform:translate(-50%,-55%) scale(1)}
  50%    {opacity:.85;transform:translate(-50%,-55%) scale(1.15)}
}
@keyframes nameReveal{
  0%  {opacity:0;letter-spacing:8px;transform:translateY(8px)}
  100%{opacity:1;letter-spacing:-.5px;transform:translateY(0)}
}
@keyframes tagReveal{
  0%  {opacity:0;transform:translateY(5px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes dotPulse{
  0%,100%{opacity:.25;transform:scale(.8)}
  50%    {opacity:1;transform:scale(1.2)}
}
.name-reveal{animation:nameReveal .8s cubic-bezier(.16,1,.3,1) .5s both}
.tag-reveal {animation:tagReveal .7s cubic-bezier(.16,1,.3,1) .85s both}
@keyframes streamFlow{
  0%  {transform:translateX(-18px);opacity:0}
  20% {opacity:.7}
  80% {opacity:.5}
  100%{transform:translateX(18px);opacity:0}
}
.water-lines{display:flex;flex-direction:column;gap:5px;margin-top:32px;align-items:center}
.water-lines span{height:1.5px;border-radius:2px;background:linear-gradient(90deg,transparent,#0EA5E9,transparent);animation:streamFlow 1.8s ease-in-out infinite}

            const firmId=profile?.firm_id||null;

          }
        }catch(e){
          console.log("✗ Supabase auth error:",e.message);
        }
      }
      console.log("⚠ Falling back to local demo mode for:",em);
      setUser(demoUser);setLerr("");return;
    }

    // Step 2 — try Supabase for real accounts
    if(!window.sb){setLerr("Invalid email or password");return;}
    try{

        .select("id,email,full_name,initials,role,firm_id,is_active")

      if(!profile){

          name:meta.full_name||em,ini:meta.initials||"AA",

    }catch(e){setLerr("Invalid email or password");}

  function exportToExcel(){
    const rows=[];
    // Header
    rows.push(["Type","Client","Amount (USD)","Status","Product","Issuer","Underlyings","Tenor","Coupon %","Barrier %","Obs. Freq","Barrier Type","Memory","Participation %","Leverage","Cap %","Strike %","Counter Issuer","Counter Coupon %","Counter Barrier %","Counter Tenor","Counter Obs. Freq","Counter Participation %","Counter Leverage","Counter Cap %","Counter Message","Time"]);

    // All indications
    inds.forEach(ind=>{
      const note=notes.find(n=>n.id===ind.nid);
      const c=ind.counter||{};
      rows.push([
        "Indication",
        ind.cn,
        ind.amt,
        ind.st,
        note?PT[note.pt]?.l:"",
        note?note.issuer:"",
        note?note.und.join(", "):"",
        note?note.tenor:"",
        note?note.coupon||"":"",
        note?note.barrier||"":"",
        note?note.cf||"":"",
        "","",
        note?note.pr||"":"",
        note?note.lev||"":"",
        note?note.cap||"":"",
        "",
        c.issuer||"",c.coupon||"",c.barrier||"",c.tenor||"",c.cf||"",c.pr||"",c.lev||"",c.cap||"",c.msg||"",
        ind.t||""
      ]);
    });

    // All client structures (RFQs)
    rfqs.forEach(ri=>{
      rows.push([
        "Structure",
        ri.cn,
        ri.notional,
        ri.status,
        PT[ri.pt]?.l||"",
        ri.issuers?.join(", ")||"",
        ri.und?.join(", ")||"",
        ri.tenor||"",
        ri.coup||"",
        ri.barrier||"",
        ri.cf||"",
        ri.btype||"",
        ri.mem?"Yes":"No",
        ri.lev||"","",ri.cap||"","",
        "","","","","","","","",
        ri.dm||"",
        ""
      ]);
    });

    // Build CSV content
    const NL="\n";
    const q=function(v){var s=String(v==null?"":v);if(s.indexOf(",")>=0||s.indexOf("\"")==0||s.length===0)return "\""+s.replace(/\"/g,"\"\"")+"\"";return s;};
    var csvLines=[];
    for(var i=0;i<rows.length;i++){csvLines.push(rows[i].map(q).join(","));}
    var csv=csvLines.join(NL);
        // Download
    const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="NoteFlow_"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast_("Exported to Excel!");
  }

// Supabase client — full implementation
(function(){
  function mkClient(url, key){
    var token = key;
    function authHeaders(){
      return {'Content-Type':'application/json','apikey':key,'Authorization':'Bearer '+token};
    }
    return {
      _setToken: function(t){ token = t||key; },
      auth: {
        signInWithPassword: async function(p){
          try{
            var r = await fetch(url+'/auth/v1/token?grant_type=password',{
              method:'POST',
              headers:{'Content-Type':'application/json','apikey':key},
              body:JSON.stringify({email:p.email,password:p.password})
            });
            var d = await r.json();
            if(!r.ok) return {data:null,error:{message:d.error_description||d.error||'Invalid login credentials'}};
            token = d.access_token||key;
            window._sbAuthToken = token;
            return {data:{user:{id:d.user.id,email:d.user.email,user_metadata:d.user.user_metadata||{}}},error:null};
          }catch(e){return {data:null,error:{message:'Connection failed. Please try again.'}};}
        },
        signUp: async function(p){
          try{
            var r = await fetch(url+'/auth/v1/signup',{
              method:'POST',
              headers:{'Content-Type':'application/json','apikey':key},
              body:JSON.stringify({email:p.email,password:p.password,data:p.options&&p.options.data||{}})
            });
            var d = await r.json();
            if(!r.ok) return {data:null,error:{message:d.error_description||d.msg||d.error||'Sign up failed'}};
            token = d.access_token||key;
            var user = d.user||d;
            return {data:{user:{id:user.id,email:user.email||p.email,user_metadata:user.user_metadata||{}}},error:null};
          }catch(e){return {data:null,error:{message:'Connection failed. Please try again.'}};}
        }
      },
      from: function(table){
        var _sel='*',_eqs=[],_base=url+'/rest/v1/'+table;
        var obj = {
          select:function(c){_sel=c||'*';return obj;},
          eq:function(col,val){_eqs.push(col+'=eq.'+encodeURIComponent(val));return obj;},
          single:async function(){
            try{
              var q='?select='+_sel+(_eqs.length?'&'+_eqs.join('&'):'');
              var r=await fetch(_base+q,{headers:{...authHeaders(),'Accept':'application/vnd.pgrst.object+json'}});
              var d=await r.json();
              if(!r.ok) return {data:null,error:d};
              return {data:d,error:null};
            }catch(e){return {data:null,error:{message:e.message}};}
          },
          insert:async function(body){
            try{
              var r=await fetch(_base,{method:'POST',headers:{...authHeaders(),'Prefer':'return=representation'},body:JSON.stringify(body)});
              var d=await r.json();
              if(!r.ok) return {data:null,error:d};
              return {data:d,error:null};
            }catch(e){return {data:null,error:{message:e.message}};}
          }
        };
        return obj;
      },
      channel:function(name){
        var _subs=[];var _ws=null;
        var ch={
          on:function(ev,filter,cb){_subs.push({filter,cb});return ch;},
          subscribe:function(sCb){
            try{
              var wsUrl=(SUPABASE_URL||'').replace('https://','wss://')+'/realtime/v1/websocket?apikey='+(SUPABASE_ANON||'')+'&vsn=1.0.0';
              var authToken=window._sbAuthToken||SUPABASE_ANON;
              _ws=new WebSocket(wsUrl);
              _ws.onopen=function(){
                if(sCb)sCb('SUBSCRIBED');
                _subs.forEach(function(s){
                  _ws.send(JSON.stringify({topic:'realtime:public:'+s.filter.table,event:'phx_join',payload:{config:{postgres_changes:[{event:'*',schema:'public',table:s.filter.table}]},access_token:window._sbAuthToken||SUPABASE_ANON},ref:'1'}));
                });
              };
              _ws.onmessage=function(e){
                try{var m=JSON.parse(e.data);if(m.event==='postgres_changes'||m.payload?.type==='INSERT'||m.payload?.type==='UPDATE')_subs.forEach(function(s){s.cb&&s.cb(m.payload||{});});}catch(e){}
              };
              _ws.onerror=function(){if(sCb)sCb('CHANNEL_ERROR');};
              setInterval(function(){if(_ws&&_ws.readyState===1)_ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'}));},20000);
            }catch(e){if(sCb)sCb('CHANNEL_ERROR');}
            return ch;
          },
          unsubscribe:function(){if(_ws){try{_ws.close();}catch(e){}}}
        };
        return ch;
      },
      removeChannel:function(ch){if(ch&&ch.unsubscribe)ch.unsubscribe();}
    };
  }
  window.sb = mkClient(SUPABASE_URL, SUPABASE_ANON);
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
})();
